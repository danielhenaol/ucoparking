# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# AZURE KEY VAULT - PROPERTY SOURCE
# ===============================
spring.cloud.azure.keyvault.secret.property-sources[0].endpoint=https://kv-ucoparking-kfu-2026.vault.azure.net/

# ===============================
# DATABASE - SQL SERVER
# ===============================
spring.datasource.url=${DB-URL}
spring.datasource.username=${DB-USERNAME}
spring.datasource.password=${DB-PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ===============================
# AUTH0 / OAUTH2 RESOURCE SERVER
# ===============================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0-ISSUER-URI}
spring.security.oauth2.resourceserver.jwt.audiences=${AUTH0-AUDIENCE}

# ===============================
# MONITOREO / ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# ===============================
# OPENTELEMETRY / TRACING
# ===============================
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=w3c

# Exportacion OTLP para metricas, trazas y logs
management.otlp.metrics.export.url=http://localhost:4318/v1/metrics
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces
management.opentelemetry.logging.export.otlp.endpoint=http://localhost:4318/v1/logs

# ===============================
# LOGGING CON MDC
# ===============================
logging.pattern.level=%5p [traceId=%X{traceId:-}, spanId=%X{spanId:-}, requestId=%X{requestId:-}, user=%X{user:-}]