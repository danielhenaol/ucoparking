services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ucoparking-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Admin12345*"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ucoparking-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  kong:
    image: kong:3.6-ubuntu
    container_name: ucoparking-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong:/kong/declarative
    restart: unless-stopped

  modsecurity:
    image: owasp/modsecurity-crs:nginx
    container_name: ucoparking-waf
    environment:
      BACKEND: "http://ucoparking-kong:8000"
      PORT: "8080"
      MODSEC_RULE_ENGINE: "On"
    ports:
      - "80:8080"
    depends_on:
      - kong
    restart: unless-stopped

volumes:
  sqlserver_data:
  redis_data: