_format_version: "3.0"
_transform: true

services:
  - name: ucoparking-backend
    url: http://ucoparking-backend:8080
    routes:
      - name: backend-route
        paths:
          - /api
        strip_path: false

  - name: ucoparking-notifications
    url: http://host.docker.internal:8084
    routes:
      - name: notifications-route
        paths:
          - /notifications
        strip_path: false

  - name: ucoparking-parameters
    url: http://host.docker.internal:8888
    routes:
      - name: parameters-route
        paths:
          - /parameters
        strip_path: false

  - name: ucoparking-strapi
    url: http://host.docker.internal:1337
    routes:
      - name: strapi-route
        paths:
          - /cms
        strip_path: false

  - name: ucoparking-frontend
    url: http://ucoparking-frontend:80
    routes:
      - name: frontend-route
        paths:
          - /
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:5173"
        - "http://localhost"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type